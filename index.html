<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

button{
    margin:10px;
    padding:10px;
    cursor:pointer;
}

#result{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
}

.user{
    width:90px;
    cursor:pointer;
    transition:0.2s;
}

.user:hover{
    transform:scale(1.1);
}

.user img{
    width:70px;
    height:70px;
    border-radius:50%;
    object-fit:cover;
}
</style>

<script>

var username = "mostaza123";
var page = 1;

function load(){
    getPage();
}

function getPage(){

    $.get(
        "https://scratch.mit.edu/users/" + username + "/followers/?page=" + page,
        function(data){

            var $dom = $(data);
            var $users = $dom.find("span.title").children();

            if($users.length === 0){
                console.log("Fin de páginas");
                return;
            }

            var i = 0;

            function addOne(){

                if(i >= $users.length){
                    page++;
                    setTimeout(getPage, 500);
                    return;
                }

                var user = $($users[i]).text().trim();
                var $parent = $($users[i]).closest("a").parent();

                i++;

                if(!user){
                    addOne();
                    return;
                }

                var img = $parent.find("img").attr("data-original");

                if(img && img.startsWith("//")){
                    img = "https:" + img;
                }

                if(!img){
                    img = "https://scratch.mit.edu/images/user-default.png";
                }

                $("#result").append(`
                    <div class="user" onclick="openUser('${user}')">
                        <img src="${img}">
                        <div>${user}</div>
                    </div>
                `);

                setTimeout(addOne, 60);
            }

            addOne();

        }
    ).fail(function(xhr){

        if(xhr.status === 404){
            console.log("No hay más páginas");
            return;
        }

        console.log("Error:", xhr.status);
    });
}

// 🌐 abrir perfil Scratch
function openUser(user){
    window.open("https://scratch.mit.edu/users/" + user, "_blank");
}

// 📦 descargar ZIP
async function downloadZip(){

    const zip = new JSZip();
    const folder = zip.folder("scratch_icons");

    const users = document.querySelectorAll(".user");

    for(let i = 0; i < users.length; i++){

        const img = users[i].querySelector("img").src;
        const name = users[i].querySelector("div").innerText;

        try{
            const response = await fetch(img);
            const blob = await response.blob();

            folder.file(name + ".png", blob);

        }catch(e){
            console.log("Error con:", name);
        }
    }

    const content = await zip.generateAsync({type:"blob"});

    const a = document.createElement("a");
    a.href = URL.createObjectURL(content);
    a.download = "followers_icons.zip";
    a.click();
}

</script>

</head>

<body onload="load()">

<h1>Followers de Scratch</h1>

<button onclick="downloadZip()">📦 Descargar iconos en ZIP</button>

<div id="result"></div>

</body>
</html>
