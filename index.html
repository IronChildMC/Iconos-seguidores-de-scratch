<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Scratch Followers Downloader</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

#grid{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    margin-top:20px;
}

.user{
    width:90px;
}

.user img{
    width:70px;
    height:70px;
    border-radius:50%;
}

button{
    padding:10px;
    margin:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>Followers de Scratch</h1>

<button onclick="descargar()">📦 Descargar ZIP</button>

<div id="grid"></div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<script>

const username = "griffpatch";
const grid = document.getElementById("grid");

let users = [];

let offset = 0;
const limit = 40;

// 🔥 cargar followers progresivamente
async function loadFollowers(){
    try{
        const res = await fetch(`https://api.scratch.mit.edu/users/${username}/followers?limit=${limit}&offset=${offset}`);

        if(!res.ok) return;

        const data = await res.json();

        if(data.length === 0) return;

        for(const u of data){
            users.push(u);

            const div = document.createElement("div");
            div.className = "user";

            const imgUrl = u.profile.images["90x90"];

            div.innerHTML = `
                <img src="${imgUrl}">
                <div>${u.username}</div>
            `;

            grid.appendChild(div);
        }

        offset += limit;

        // 🔁 sigue cargando
        loadFollowers();

    } catch(e){
        console.log("Error cargando followers", e);
    }
}

loadFollowers();

// 📦 ZIP DOWNLOAD
async function descargar(){
    const zip = new JSZip();
    const folder = zip.folder("followers_icons");

    for(let i = 0; i < users.length; i++){
        const u = users[i];

        try{
            const url = u.profile.images["90x90"];
            const res = await fetch(url);
            const blob = await res.blob();

            folder.file(u.username + ".png", blob);
        } catch(e){
            console.log("Error con", u.username);
        }
    }

    const content = await zip.generateAsync({type:"blob"});

    const a = document.createElement("a");
    a.href = URL.createObjectURL(content);
    a.download = "followers.zip";
    a.click();
}

</script>

</body>
</html>
