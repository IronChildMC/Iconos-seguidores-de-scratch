<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Followers Loader</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

#grid{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
}

.user{
    width:90px;
}

.user img{
    width:64px;
    height:64px;
    border-radius:50%;
}
</style>
</head>

<body>

<h1>Seguidores (carga progresiva)</h1>
<button onclick="start()">Cargar</button>

<div id="grid"></div>

<script>
const username = "mostaza123";

let offset = 0;
const limit = 40;
let loading = false;

async function loadBatch(){
    if(loading) return;
    loading = true;

    const res = await fetch(
        `https://api.scratch.mit.edu/users/${username}/followers?limit=${limit}&offset=${offset}`
    );

    if(!res.ok){
        console.log("Fin o error");
        loading = false;
        return;
    }

    const data = await res.json();

    if(data.length === 0){
        console.log("No hay más seguidores");
        loading = false;
        return;
    }

    for(const user of data){
        addUser(user.username);
        await sleep(80); // 👈 uno a uno (efecto bonito)
    }

    offset += limit;
    loading = false;

    // sigue cargando automáticamente
    loadBatch();
}

function addUser(name){
    const img = `https://uploads.scratch.mit.edu/get_image/user/${name}_60x60.png`;

    const div = document.createElement("div");
    div.className = "user";

    div.innerHTML = `
        <img src="${img}">
        <div>${name}</div>
    `;

    document.getElementById("grid").appendChild(div);
}

function sleep(ms){
    return new Promise(r => setTimeout(r, ms));
}

function start(){
    loadBatch();
}
</script>

</body>
</html>
