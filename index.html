<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Descargar seguidores Scratch</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

#followers{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    margin-top:20px;
}

.user{
    width:90px;
}

.user img{
    width:64px;
    height:64px;
    border-radius:50%;
}

button{
    padding:10px 15px;
    margin:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>Seguidores de mostaza123</h1>

<button onclick="descargarTodos()">📦 Descargar iconos</button>

<div id="followers"></div>

<!-- JSZip -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
const username = "mostaza123";
const container = document.getElementById("followers");

let usuarios = [];

async function cargarPagina(offset){
    const r = await fetch(`https://api.scratch.mit.edu/users/${username}/followers?limit=40&offset=${offset}`);
    if(!r.ok) return [];
    return await r.json();
}

async function cargarTodos(){
    let offset = 0;

    while(true){
        const data = await cargarPagina(offset);
        if(data.length === 0) break;

        data.forEach(u => {
            usuarios.push(u);

            const div = document.createElement("div");
            div.className = "user";

            div.innerHTML = `
                <img src="${u.profile.images['90x90']}">
                <div>${u.username}</div>
            `;

            container.appendChild(div);
        });

        offset += 40;
    }
}

async function descargarTodos(){
    const zip = new JSZip();
    const carpeta = zip.folder("iconos_scratch");

    for(let i = 0; i < usuarios.length; i++){
        const u = usuarios[i];

        const url = u.profile.images['90x90'];

        const response = await fetch(url);
        const blob = await response.blob();

        carpeta.file(`${u.username}.png`, blob);
    }

    const content = await zip.generateAsync({type:"blob"});

    const a = document.createElement("a");
    a.href = URL.createObjectURL(content);
    a.download = "followers_icons.zip";
    a.click();
}

cargarTodos();
</script>

</body>
</html>
