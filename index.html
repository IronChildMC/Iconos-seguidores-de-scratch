<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Followers Scratch</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

.user{
    display:inline-block;
    margin:10px;
}

.user img{
    border-radius:50%;
    width:80px;
    height:80px;
}
</style>

<script>

var username = "mostaza123";
var page = 1;

function load(){
    getPage();
}

function getPage(){
    $.get("https://scratch.mit.edu/users/" + username + "/followers/?page=" + page, function(data){

        var $dom = $(data);

        // usuarios en la página
        var $users = $dom.find("span.title").children();

        if($users.length === 0){
            console.log("Fin de páginas");
            return;
        }

        var $out = $("#result");

        $users.each(function(){

            var user = $(this).text().trim();
            if(!user) return;

            var img = "https://uploads.scratch.mit.edu/get_image/user/" + user + "_60x60.png";

            $out.append(`
                <div class="user">
                    <img src="${img}">
                    <div>${user}</div>
                </div>
            `);
        });

        page++;
        getPage(); // siguiente página

    }).fail(function(){
        console.log("Error o bloqueado por CORS");
    });
}

</script>
</head>

<body onload="load()">

<h1>Followers</h1>
<div id="result"></div>

</body>
</html>
