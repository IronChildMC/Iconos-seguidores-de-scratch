<html>
<head>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

#result{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
}

.user{
    width:90px;
}

.user img{
    width:70px;
    height:70px;
    border-radius:50%;
}
</style>

<script>

var username = "mostaza123";
var page = 1;

function load(){
    getPage();
}

function getPage(){

    $.get("https://scratch.mit.edu/users/" + username + "/followers/?page=" + page, function(data){

        var $dom = $(data);
        var $users = $dom.find("span.title").children();

        if($users.length === 0){
            console.log("Fin de páginas");
            return;
        }

        var i = 0;

        function addOne(){

            if(i >= $users.length){
                page++;
                setTimeout(getPage, 500);
                return;
            }

            var user = $($users[i]).text().trim();
            i++;

            if(!user){
                addOne();
                return;
            }

            var img = "https://uploads.scratch.mit.edu/get_image/user/" + user + "_60x60.png";

            $("#result").append(`
                <div class="user">
                    <img src="${img}">
                    <div>${user}</div>
                </div>
            `);

            setTimeout(addOne, 60); // 👈 uno a uno suave
        }

        addOne();

    }).fail(function(){
        console.log("Error o bloqueado o fin real");
    });
}

</script>
</head>

<body onload="load()">

<h1>Followers</h1>
<div id="result"></div>

</body>
</html>
