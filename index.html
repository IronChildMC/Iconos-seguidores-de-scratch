<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Followers Scratch</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

#result{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
}

.user{
    width:90px;
}

.user img{
    width:70px;
    height:70px;
    border-radius:50%;
    object-fit:cover;
}

#debug{
    margin-top:20px;
    padding:10px;
    text-align:left;
    white-space:pre-wrap;
    max-height:300px;
    overflow:auto;
    border:1px solid #444;
}
</style>

<script>
var username = "mostaza123";
var page = 1;

function load(){
    getPage();
}

function getPage(){

    $.get(
        "https://scratch.mit.edu/users/" + username + "/followers/?page=" + page,

        function(data){

            // Mostrar una parte del HTML recibido
            document.getElementById("debug").textContent =
                data.substring(0, 5000);

            var $dom = $(data);

            var $users = $dom.find("span.title").children();

            if($users.length === 0){
                console.log("Fin de páginas");
                return;
            }

            var i = 0;

            function addOne(){

                if(i >= $users.length){
                    page++;
                    setTimeout(getPage, 500);
                    return;
                }

                var user = $($users[i]).text().trim();
                i++;

                if(!user){
                    addOne();
                    return;
                }

                // Imagen temporal para pruebas
                var img = "https://scratch.mit.edu/images/user-default.png";

                $("#result").append(`
                    <div class="user">
                        <img src="${img}">
                        <div>${user}</div>
                    </div>
                `);

                setTimeout(addOne, 60);
            }

            addOne();
        }

    ).fail(function(xhr, status, error){
        console.log("Error:", status, error);
    });
}
</script>

</head>

<body onload="load()">

<h1>Followers</h1>

<div id="result"></div>

<h2>Debug HTML recibido</h2>
<div id="debug"></div>

</body>
</html>
