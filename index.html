<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Seguidores Scratch</title>
<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}
#followers{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
}
.user{
    width:90px;
}
.user img{
    width:64px;
    height:64px;
    border-radius:50%;
}
</style>
</head>
<body>

<h1>Seguidores de mostaza123</h1>
<div id="followers"></div>

<script>
const username = "mostaza123";
const container = document.getElementById("followers");

async function cargarPagina(offset){
    const r = await fetch(
        `https://api.scratch.mit.edu/users/${username}/followers?limit=40&offset=${offset}`
    );

    if(!r.ok) return [];

    return await r.json();
}

async function cargarTodos(){
    let offset = 0;

    while(true){
        const seguidores = await cargarPagina(offset);

        if(seguidores.length === 0) break;

        seguidores.forEach(user => {
            const div = document.createElement("div");
            div.className = "user";

            div.innerHTML = `
                <img src="${user.profile.images['90x90']}" loading="lazy">
                <div>${user.username}</div>
            `;

            container.appendChild(div);
        });

        offset += 40;
    }
}

cargarTodos();
</script>

</body>
</html>
