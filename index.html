<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

#result{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
}

/* ahora es clickable */
.user{
    width:90px;
    text-decoration:none;
    color:white;
    cursor:pointer;
    display:inline-block;
    transition:0.2s;
}

.user:hover{
    transform:scale(1.05);
}

.user img{
    width:70px;
    height:70px;
    border-radius:50%;
    object-fit:cover;
}
</style>

<script>

var username = "mostaza123";
var page = 1;

function load(){
    getPage();
}

function getPage(){

    $.get(
        "https://scratch.mit.edu/users/" + username + "/followers/?page=" + page,
        function(data){

            var $dom = $(data);
            var $users = $dom.find("span.title").children();

            if($users.length === 0){
                console.log("Fin de páginas");
                return;
            }

            var i = 0;

            function addOne(){

                if(i >= $users.length){
                    page++;
                    setTimeout(getPage, 500);
                    return;
                }

                var $userEl = $($users[i]).closest("a").parent().parent();
                var user = $($users[i]).text().trim();

                i++;

                if(!user){
                    addOne();
                    return;
                }

                // imagen real de Scratch
                var img = $userEl.find("img").attr("data-original");

                if(img && img.startsWith("//")){
                    img = "https:" + img;
                }

                if(!img){
                    img = "https://scratch.mit.edu/images/user-default.png";
                }

                $("#result").append(`
                    <a class="user" href="https://scratch.mit.edu/users/${user}/" target="_blank">
                        <img src="${img}">
                        <div>${user}</div>
                    </a>
                `);

                setTimeout(addOne, 60);
            }

            addOne();

        }
    ).fail(function(xhr){

        if(xhr.status === 404){
            console.log("No hay más páginas");
            return;
        }

        console.log("Error:", xhr.status);
    });
}

</script>
</head>

<body onload="load()">

<h1>Followers de Scratch</h1>

<div id="result"></div>

</body>
</html>
